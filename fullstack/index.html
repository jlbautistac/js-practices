<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="py-5 container">
        <h2>Task Manager</h2>

        <form action="" method="post" id="task-form">
            <label for="task-title">Task:</label>
            <input id="task-title" type="text" class="form-control mb-2">
            <label for="task-priority">Priority:</label>
            <select name="priority" id="task-priority" class="form-select mb-4">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
            <button type="submit" class="btn btn-primary"><i class="bi bi-floppy2-fill"></i></button>
        </form>
    </div>
    <div class="container">
        <h2>Tasks List</h2>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Task</th>
                    <th>Priority</th>
                    <th>Is Completed</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tasks_list">
                
            </tbody>
        </table>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
